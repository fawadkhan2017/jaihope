        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #4a1bd9;
            --primary-hover: #3a15ad;
            --bg-dark: #0f1219;
            --disclaimer-bg: #ffcc00;
        }
    }
    
    body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    @layer utilities {
        .text-gradient {
            @apply bg-clip-text text-transparent bg-gradient-to-r from-[var(--primary)] to-purple-600;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-3d {
            transform-style: preserve-3d;
        }
    }

    @tailwind utilities;

    @layer utilities {
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll {
            animation: scroll 30s linear infinite;
        }
        .text-yellow-400
        {
            color: #4338CA;
        }
    }
    </style>
</head>
